<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>日韓旅行支出</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">旅</div>
        <div>
          <h1>日韓旅行支出</h1>
          <p>選擇要記錄的旅行頁面</p>
        </div>
      </div>
    </header>

    <main class="start-page">
      <section class="start-panel">
        <div>
          <p class="eyebrow">Travel Ledger</p>
          <h2>分開管理日本與韓國支出</h2>
          <p class="start-copy">人員與備份資料共用，但每個頁面只顯示自己的支出、摘要與結算。</p>
        </div>

        <div class="trip-choice-grid">
          <a class="trip-choice japan" href="japan.html">
            <span>日本</span>
            <strong>2026 日本支出</strong>
            <small>日幣 JPY 記帳與分攤</small>
          </a>
          <a class="trip-choice korea" href="korea.html">
            <span>韓國</span>
            <strong>2026 韓國支出</strong>
            <small>韓幣 KRW 記帳與分攤</small>
          </a>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
